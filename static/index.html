<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI聊天机器人</title>
    <style>
        body{max-width:700px;margin:30px auto;font-family:Arial;padding:0 20px}
        .chat{border:1px solid #ddd;height:500px;border-radius:10px;display:flex;flex-direction:column}
        .msgs{flex:1;padding:15px;overflow-y:auto}
        .msg{margin:8px;padding:10px 14px;border-radius:15px;max-width:70%}
        .user{background:#007bff;color:white;margin-left:auto}
        .bot{background:#f1f1f1;margin-right:auto}
        .input-area{display:flex;padding:10px}
        input{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;outline:none}
        button{margin-left:10px;padding:10px 18px;background:#007bff;color:white;border:none;border-radius:20px;cursor:pointer}
    </style>
</head>
<body>
    <h2>AI 聊天机器人</h2>
    <div class="chat">
        <div class="msgs" id="msgs"></div>
        <div class="input-area">
            <input id="input" placeholder="输入消息...">
            <button onclick="send()">发送</button>
        </div>
    </div>
    <script>
        async function send() {
            const input = document.getElementById("input");
            const text = input.value.trim();
            if (!text) return;
            const msgs = document.getElementById("msgs");
            msgs.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            const res = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            msgs.innerHTML += `<div class="msg bot">${data.reply}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }
    </script>
</body>
</html>
